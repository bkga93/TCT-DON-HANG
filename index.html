<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCT DON HANG - Camera Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Dashboard (Home) -->
        <main id="dashboard" class="dashboard">
            <header>
                <div class="logo">
                    <i data-lucide="package"></i>
                    <h1>TCT DON HANG</h1>
                </div>
                <button id="open-camera-btn" class="main-action-btn">
                    <i data-lucide="camera"></i> Mở Camera
                </button>
            </header>

            <section class="history-section">
                <div class="section-header">
                    <h2><i data-lucide="history"></i> Lịch sử quét</h2>
                    <button id="clear-btn" class="text-btn">Xóa hết</button>
                </div>
                <div id="results-list" class="results-list">
                    <div class="empty-state">
                        <i data-lucide="scan"></i>
                        <p>Nhấn "Mở Camera" để bắt đầu</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Fullscreen Camera Interface -->
        <div id="camera-interface" class="camera-interface hidden">
            <div id="reader"></div>
            
            <!-- Camera Overlays -->
            <div class="camera-ui">
                <div class="top-bar">
                    <button id="close-camera-btn" class="icon-btn">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <div class="viewfinder">
                    <div class="viewfinder-corners"></div>
                </div>

                <div class="bottom-bar">
                    <div class="shutter-container">
                        <button id="shutter-btn" class="shutter-btn"></button>
                    </div>
                </div>
            </div>

            <!-- Analysis HUD -->
            <div id="analysis-hud" class="analysis-hud hidden">
                <div class="spinner-ios"></div>
                <p id="hud-message">Đang nạp bộ máy OCR...</p>
                <div class="hud-progress">
                    <div id="hud-progress-bar" class="hud-progress-fill"></div>
                </div>
            </div>
            
            <div id="flash-effect" class="flash-effect"></div>
        </div>

        <!-- Result Drawer (Sheet) -->
        <div id="result-drawer" class="result-drawer hidden">
            <div class="drawer-handle"></div>
            <div class="drawer-header">
                <h3>Kết quả phân tích</h3>
                <button id="close-drawer-btn" class="icon-btn">
                    <i data-lucide="chevron-down"></i>
                </button>
            </div>
            <div id="drawer-content" class="drawer-content">
                <!-- Results cards go here -->
            </div>
            <div class="drawer-footer">
                <button id="copy-btn" class="secondary-btn">
                    <i data-lucide="copy"></i> Copy tất cả
                </button>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
