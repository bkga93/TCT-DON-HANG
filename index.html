<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCT Multi-Scanner Pro</title>
    <link rel="stylesheet" href="style.css?v=1.3.8">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body class="theme-dark-1">
    <div class="app-container">
        <header>
            <h1>TCT SCANNER PRO</h1>
            <div id="versionTag" style="font-size: 0.7rem; opacity: 0.5; margin-top: -5px;">Phiên bản v1.3.8 (Smart Product Scan)</div>
        </header>

        <main>
            <div class="viewfinder-container">
                <video id="video" autoplay playsinline muted></video>
                <div class="scanning-line" id="scanLine"></div>
                <div id="scanProgress" class="scan-progress-container">
                    <div class="scan-progress-bar"></div>
                    <div class="scan-progress-text">Đang phân tích ảnh...</div>
                </div>
                <canvas id="captureCanvas" style="display: none;"></canvas>
            </div>

            <div class="controls">
                <button id="captureBtn" class="btn btn-primary">
                    <span class="icon">📸</span> CHỤP & QUÉT TẤT CẢ QR
                </button>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button id="uploadBtn" class="btn" style="flex: 1;">
                        <span class="icon">📁</span> CHỌN ẢNH
                    </button>
                    <button id="switchCamBtn" class="btn" style="flex: 1;">
                        <span class="icon">🔄</span> ĐỔI CAM
                    </button>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <button id="settingsBtn" class="btn">
                    <span class="icon">🎨</span> CÀI ĐẶT GIAO DIỆN
                </button>
            </div>

            <div id="resultSection" class="result-board">
                <div class="result-header">
                    <h3>Kết quả quét được (<span id="qrCount">0</span>)</h3>
                    <button id="closeResultBtn" class="btn" style="padding: 8px 12px; font-size: 0.8rem;">Đóng</button>
                </div>
                
                <!-- Preview captured image -->
                <div id="capturePreviewContainer" style="margin-bottom: 20px; text-align: center;">
                    <p style="font-size: 0.75rem; color: var(--primary-color); margin-bottom: 8px; text-transform: uppercase; font-weight: 700;">Ảnh đã chụp (Sẵn sàng lưu Cloud)</p>
                    <img id="capturePreview" style="width: 100%; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                </div>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>Nội dung</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody">
                            <!-- Kết quả sẽ hiện ở đây -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <div class="copyright">Thực hiện bởi NVH</div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeSettingsModal">&times;</button>
            <h2 style="margin-bottom: 20px; font-family: 'Outfit';">Chọn Theme</h2>
            
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px;">Themes Tối</p>
            <div class="theme-grid" id="darkThemes">
                <div class="theme-opt active" style="background: #2D122A;" data-theme="theme-dark-1"><span>Plum</span></div>
                <div class="theme-opt" style="background: #0d1117;" data-theme="theme-dark-2"><span>Night</span></div>
                <div class="theme-opt" style="background: #121212;" data-theme="theme-dark-3"><span>Amoled</span></div>
                <div class="theme-opt" style="background: #1a1a2e;" data-theme="theme-dark-4"><span>Navy</span></div>
                <div class="theme-opt" style="background: #0b2027;" data-theme="theme-dark-5"><span>Forest</span></div>
            </div>

            <p style="font-size: 0.8rem; opacity: 0.7; margin: 20px 0 10px;">Themes Sáng</p>
            <div class="theme-grid" id="lightThemes">
                <div class="theme-opt" style="background: #f0f2f5;" data-theme="theme-light-1"><span>Day</span></div>
                <div class="theme-opt" style="background: #fffaf0;" data-theme="theme-light-2"><span>Cream</span></div>
                <div class="theme-opt" style="background: #f8fafc;" data-theme="theme-light-3"><span>Snow</span></div>
                <div class="theme-opt" style="background: #faf5ff;" data-theme="theme-light-4"><span>Silk</span></div>
            </div>
        </div>
    </div>

    <script src="app.js?v=1.3.8"></script>
</body>
</html>
